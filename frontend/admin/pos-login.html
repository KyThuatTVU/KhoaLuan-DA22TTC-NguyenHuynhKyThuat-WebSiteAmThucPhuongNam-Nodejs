<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập POS | Nhà Hàng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 90%;
            max-width: 400px;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header i {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .role-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
        }

        .role-info h4 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .role-info ul {
            list-style: none;
            padding-left: 0;
        }

        .role-info li {
            padding: 5px 0;
            color: #666;
        }

        .role-info li i {
            color: #667eea;
            margin-right: 8px;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .demo-accounts {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            border: 1px solid #ffc107;
        }

        .demo-accounts h4 {
            margin-bottom: 10px;
            color: #856404;
            font-size: 14px;
        }

        .demo-accounts p {
            font-size: 12px;
            color: #856404;
            margin: 5px 0;
        }

        .demo-accounts strong {
            color: #000;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-utensils"></i>
            <h1>POS Nhà Hàng</h1>
            <p>Ẩm Thực Phương Nam</p>
        </div>

        <div class="login-body">
            <div id="alertBox" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Tài khoản</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Nhập tài khoản" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Vai trò</label>
                    <div class="input-group">
                        <i class="fas fa-user-tag"></i>
                        <select id="role" required>
                            <option value="">Chọn vai trò...</option>
                            <option value="staff">Nhân viên Order</option>
                            <option value="manager">Quản lý</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                </button>
            </form>

            <div class="demo-accounts">
                <h4><i class="fas fa-info-circle"></i> Tài khoản demo</h4>
                <p><strong>Nhân viên:</strong> nhanvien1 / 123456</p>
                <p><strong>Quản lý:</strong> admin / admin123</p>
            </div>

            <div class="role-info">
                <h4><i class="fas fa-shield-alt"></i> Phân quyền hệ thống</h4>
                <ul>
                    <li><i class="fas fa-check-circle"></i> <strong>Nhân viên:</strong> Order món, gửi bếp</li>
                    <li><i class="fas fa-check-circle"></i> <strong>Quản lý:</strong> Tính tiền, in bill, thống kê</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tai_khoan = document.getElementById('username').value;
            const mat_khau = document.getElementById('password').value;
            const expectedRole = document.getElementById('role').value;
            
            if (!expectedRole) {
                showAlert('Vui lòng chọn vai trò!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/staff/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tai_khoan, mat_khau })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const userData = result.data;
                    
                    // Kiểm tra vai trò có khớp không
                    if (userData.vai_tro !== expectedRole) {
                        showAlert(`Tài khoản này là ${userData.vai_tro === 'manager' ? 'Quản lý' : 'Nhân viên'}, vui lòng chọn đúng vai trò!`, 'error');
                        return;
                    }
                    
                    // Lưu thông tin đăng nhập
                    localStorage.setItem('pos_user', JSON.stringify({
                        ma_nhan_vien: userData.ma_nhan_vien,
                        ten_nhan_vien: userData.ten_nhan_vien,
                        tai_khoan: userData.tai_khoan,
                        vai_tro: userData.vai_tro,
                        so_dien_thoai: userData.so_dien_thoai
                    }));
                    
                    showAlert('Đăng nhập thành công!', 'success');
                    
                    // Redirect theo role
                    setTimeout(() => {
                        if (userData.vai_tro === 'staff') {
                            window.location.href = 'pos-tables.html'; // Nhân viên → Giao diện bàn
                        } else {
                            window.location.href = 'dashboard.html'; // Quản lý → Dashboard
                        }
                    }, 1000);
                } else {
                    showAlert(result.message || 'Đăng nhập thất bại!', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Có lỗi xảy ra! Vui lòng thử lại.', 'error');
            }
        });
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type} show`;
            
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 3000);
        }
        
        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('pos_user') || 'null');
            if (user) {
                if (user.vai_tro === 'staff') {
                    window.location.href = 'pos-tables.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
