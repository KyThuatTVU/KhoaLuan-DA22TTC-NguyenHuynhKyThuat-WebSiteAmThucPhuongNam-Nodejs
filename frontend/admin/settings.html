<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt - Admin</title>
    <link rel="icon" type="image/png" href="../images/Green Simple Clean Vegan Food Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-responsive.css">
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Sidebar Overlay -->
            <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
            
            <!-- Header Placeholder -->
            <div id="header-placeholder"></div>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="max-w-4xl mx-auto space-y-6">
                    <!-- Restaurant Info -->
                    <div class="content-card">
                        <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800"><i class="fas fa-store text-blue-600 mr-2"></i>Thông tin nhà hàng</h3>
                        <form class="space-y-4" onsubmit="saveRestaurantInfo(event)">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="block text-sm font-medium text-slate-700 mb-2">Tên nhà hàng</label><input type="text" id="ten_nha_hang" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                                <div><label class="block text-sm font-medium text-slate-700 mb-2">Số điện thoại</label><input type="tel" id="so_dien_thoai" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                                <div><label class="block text-sm font-medium text-slate-700 mb-2">Email</label><input type="email" id="email" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                                <div><label class="block text-sm font-medium text-slate-700 mb-2">Website</label><input type="url" id="website" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                                <div class="md:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-2">Địa chỉ</label><input type="text" id="dia_chi" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                            </div>
                            <div class="flex justify-end"><button type="submit" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl hover:bg-slate-900 font-medium"><i class="fas fa-save mr-2"></i>Lưu thay đổi</button></div>
                        </form>
                    </div>

                    <!-- Business Hours -->
                    <div class="content-card">
                        <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800"><i class="fas fa-clock text-blue-600 mr-2"></i>Giờ hoạt động</h3>
                        <div class="space-y-3">
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                <span class="font-medium text-slate-700">Thứ 2 - Thứ 6</span>
                                <div class="flex items-center space-x-2">
                                    <div class="relative">
                                        <input type="text" id="gio_mo_t2t6" class="pl-3 pr-8 py-2 border border-slate-200 rounded-xl w-32 time-picker" placeholder="00:00">
                                        <i class="fas fa-clock absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                                    </div>
                                    <span class="text-slate-400">-</span>
                                    <div class="relative">
                                        <input type="text" id="gio_dong_t2t6" class="pl-3 pr-8 py-2 border border-slate-200 rounded-xl w-32 time-picker" placeholder="00:00">
                                        <i class="fas fa-clock absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                <span class="font-medium text-slate-700">Thứ 7 - Chủ nhật</span>
                                <div class="flex items-center space-x-2">
                                    <div class="relative">
                                        <input type="text" id="gio_mo_t7cn" class="pl-3 pr-8 py-2 border border-slate-200 rounded-xl w-32 time-picker" placeholder="00:00">
                                        <i class="fas fa-clock absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                                    </div>
                                    <span class="text-slate-400">-</span>
                                    <div class="relative">
                                        <input type="text" id="gio_dong_t7cn" class="pl-3 pr-8 py-2 border border-slate-200 rounded-xl w-32 time-picker" placeholder="00:00">
                                        <i class="fas fa-clock absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-end mt-4"><button onclick="saveBusinessHours()" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl hover:bg-slate-900 font-medium"><i class="fas fa-save mr-2"></i>Lưu thay đổi</button></div>
                    </div>

                    <!-- Delivery Settings -->
                    <div class="content-card">
                        <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800"><i class="fas fa-shipping-fast text-blue-600 mr-2"></i>Cài đặt giao hàng</h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                <div><p class="font-medium text-slate-700">Cho phép giao hàng</p><p class="text-sm text-slate-500">Bật/tắt chức năng giao hàng</p></div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="cho_phep_giao_hang" class="sr-only peer">
                                    <div class="w-11 h-6 bg-slate-200 peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                </label>
                            </div>
                            <div><label class="block text-sm font-medium text-slate-700 mb-2">Phí giao hàng mặc định (VNĐ)</label><input type="number" id="phi_giao_hang" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                            <div><label class="block text-sm font-medium text-slate-700 mb-2">Miễn phí giao hàng cho đơn từ (VNĐ)</label><input type="number" id="mien_phi_giao_hang_tu" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                        </div>
                        <div class="flex justify-end mt-4"><button onclick="saveDeliverySettings()" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl hover:bg-slate-900 font-medium"><i class="fas fa-save mr-2"></i>Lưu thay đổi</button></div>
                    </div>

                    <!-- Social Media Links -->
                    <div class="content-card">
                        <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800"><i class="fas fa-share-alt text-blue-600 mr-2"></i>Mạng xã hội</h3>
                        <div class="space-y-4">
                            <div class="flex items-center space-x-4 p-4 bg-slate-50 rounded-xl">
                                <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center flex-shrink-0"><i class="fab fa-facebook-f text-white text-xl"></i></div>
                                <div class="flex-1"><label class="block text-sm font-medium text-slate-700 mb-1">Facebook</label><input type="url" id="facebook_url" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                            </div>
                            <div class="flex items-center space-x-4 p-4 bg-slate-50 rounded-xl">
                                <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center flex-shrink-0"><i class="fab fa-youtube text-white text-xl"></i></div>
                                <div class="flex-1"><label class="block text-sm font-medium text-slate-700 mb-1">YouTube</label><input type="url" id="youtube_url" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>
                            </div>
                        </div>
                        <div class="flex justify-end mt-4"><button onclick="saveSocialMedia()" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl hover:bg-slate-900 font-medium"><i class="fas fa-save mr-2"></i>Lưu thay đổi</button></div>
                    </div>

                    <!-- Visual Effects Settings -->
                    <div class="content-card">
                        <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800"><i class="fas fa-magic text-blue-600 mr-2"></i>Hiệu ứng trang trí</h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                <div class="flex items-center space-x-3"><span class="text-xl">🎄</span><div><p class="font-medium text-slate-700">Intro Giáng sinh</p></div></div>
                                <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="hieu_ung_intro_giang_sinh" onchange="saveEffectSetting('hieu_ung_intro_giang_sinh', this.checked)" class="sr-only peer"><div class="w-11 h-6 bg-slate-200 peer-focus:ring-4 rounded-full peer peer-checked:bg-green-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></label>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                <div class="flex items-center space-x-3"><span class="text-xl">🧧</span><div><p class="font-medium text-slate-700">Intro Tết</p></div></div>
                                <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="hieu_ung_intro_tet" onchange="saveEffectSetting('hieu_ung_intro_tet', this.checked)" class="sr-only peer"><div class="w-11 h-6 bg-slate-200 peer-focus:ring-4 rounded-full peer peer-checked:bg-red-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></label>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                <div class="flex items-center space-x-3"><span class="text-xl">❄️</span><div><p class="font-medium text-slate-700">Tuyết Rơi</p></div></div>
                                <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="hieu_ung_tuyet" onchange="saveEffectSetting('hieu_ung_tuyet', this.checked)" class="sr-only peer"><div class="w-11 h-6 bg-slate-200 peer-focus:ring-4 rounded-full peer peer-checked:bg-blue-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></label>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                <div class="flex items-center space-x-3"><span class="text-xl">🌸</span><div><p class="font-medium text-slate-700">Hoa Mai Rơi</p></div></div>
                                <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="hieu_ung_hoa_mai" onchange="saveEffectSetting('hieu_ung_hoa_mai', this.checked)" class="sr-only peer"><div class="w-11 h-6 bg-slate-200 peer-focus:ring-4 rounded-full peer peer-checked:bg-yellow-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></label>
                            </div>
                            <div class="flex flex-wrap gap-2 pt-2">
                                <button onclick="previewChristmasIntro()" class="px-4 py-2 bg-green-100 text-green-700 rounded-lg text-sm font-medium">Xem intro Giáng sinh</button>
                                <button onclick="previewTetIntro()" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg text-sm font-medium">Xem intro Tết</button>
                                <button onclick="stopAllEffects()" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium">Dừng xem trước</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="admin-layout.js"></script>
    <script src="admin-mobile.js"></script>
    <script>
        async function loadSettings() {
            try {
                const res = await fetch(`${API_URL}/settings`, { credentials: 'include' });
                const data = (await res.json()).data;
                if (!data) return;
                document.getElementById('ten_nha_hang').value = data.ten_nha_hang || '';
                document.getElementById('so_dien_thoai').value = data.so_dien_thoai || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('website').value = data.website || '';
                document.getElementById('dia_chi').value = data.dia_chi || '';
                if (data.gio_mo_cua_t2_t6) { const [o, c] = data.gio_mo_cua_t2_t6.split('-'); document.getElementById('gio_mo_t2t6').value = o; document.getElementById('gio_dong_t2t6').value = c; }
                if (data.gio_mo_cua_t7_cn) { const [o, c] = data.gio_mo_cua_t7_cn.split('-'); document.getElementById('gio_mo_t7cn').value = o; document.getElementById('gio_dong_t7cn').value = c; }
                document.getElementById('cho_phep_giao_hang').checked = data.cho_phep_giao_hang === '1';
                document.getElementById('phi_giao_hang').value = data.phi_giao_hang || '';
                document.getElementById('mien_phi_giao_hang_tu').value = data.mien_phi_giao_hang_tu || '';
                document.getElementById('facebook_url').value = data.facebook_url || '';
                document.getElementById('youtube_url').value = data.youtube_url || '';
                document.getElementById('hieu_ung_intro_giang_sinh').checked = data.hieu_ung_intro_giang_sinh === '1';
                document.getElementById('hieu_ung_intro_tet').checked = data.hieu_ung_intro_tet === '1';
                document.getElementById('hieu_ung_tuyet').checked = data.hieu_ung_tuyet === '1';
                document.getElementById('hieu_ung_hoa_mai').checked = data.hieu_ung_hoa_mai === '1';
            } catch (e) { console.error(e); }
        }

        async function saveBulk(settings) {
            try { const res = await fetch(`${API_URL}/settings/bulk`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ settings }), credentials: 'include' }); return await res.json(); } catch (e) { return { success: false }; }
        }

        async function saveRestaurantInfo(e) { e.preventDefault(); const res = await saveBulk({ ten_nha_hang: document.getElementById('ten_nha_hang').value, so_dien_thoai: document.getElementById('so_dien_thoai').value, email: document.getElementById('email').value, website: document.getElementById('website').value, dia_chi: document.getElementById('dia_chi').value }); alert(res.success ? 'Đã lưu' : 'Lỗi'); }
        async function saveBusinessHours() { const res = await saveBulk({ gio_mo_cua_t2_t6: `${document.getElementById('gio_mo_t2t6').value}-${document.getElementById('gio_dong_t2t6').value}`, gio_mo_cua_t7_cn: `${document.getElementById('gio_mo_t7cn').value}-${document.getElementById('gio_dong_t7cn').value}` }); alert(res.success ? 'Đã lưu' : 'Lỗi'); }
        async function saveDeliverySettings() { const res = await saveBulk({ cho_phep_giao_hang: document.getElementById('cho_phep_giao_hang').checked ? '1' : '0', phi_giao_hang: document.getElementById('phi_giao_hang').value, mien_phi_giao_hang_tu: document.getElementById('mien_phi_giao_hang_tu').value }); alert(res.success ? 'Đã lưu' : 'Lỗi'); }
        async function saveSocialMedia() { const res = await saveBulk({ facebook_url: document.getElementById('facebook_url').value, youtube_url: document.getElementById('youtube_url').value }); alert(res.success ? 'Đã lưu' : 'Lỗi'); }
        async function saveEffectSetting(k, v) { await fetch(`${API_URL}/settings/${k}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ value: v ? '1' : '0' }), credentials: 'include' }); }

        function previewChristmasIntro() { if (!window.ChristmasIntro) { const s = document.createElement('script'); s.src = '../js/christmas-intro.js'; s.onload = () => window.ChristmasIntro.show(); document.head.appendChild(s); } else window.ChristmasIntro.show(); }
        function previewTetIntro() { if (!window.TetIntro) { const s = document.createElement('script'); s.src = '../js/tet-intro.js'; s.onload = () => window.TetIntro.show(); document.head.appendChild(s); } else window.TetIntro.show(); }
        function stopAllEffects() { if (window.ChristmasIntro) window.ChristmasIntro.hide?.(); if (window.TetIntro) window.TetIntro.hide?.(); }

        loadSettings();

        // Khởi tạo Flatpickr cho các input giờ
        const fpConfig = {
            enableTime: true,
            noCalendar: true,
            dateFormat: "H:i",
            time_24hr: true,
            disableMobile: "true"
        };
        flatpickr(".time-picker", fpConfig);
    </script>
</body>
</html>
